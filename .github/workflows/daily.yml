name: Digital Commerce Intelligence Brief

'on':
  workflow_dispatch:
  schedule:
    - cron: "50 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  push-intelligence-brief:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Run script
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python main.py


      - name: Commit archive history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/archive output/data
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            BRIEF_DATE=$(ls output/data/*.json | sed 's#.*/##; s#\.json$##' | sort | tail -n 1)
            git commit -m "archive: save intelligence brief for ${BRIEF_DATE} [skip ci]"
            git push
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
