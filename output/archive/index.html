<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>历史日报 | Digital Commerce Intelligence</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --ink: #172033;
      --muted: #687386;
      --line: #e6e9ef;
      --blue: #2357d9;
      --blue-soft: #edf3ff;
      --dark: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 760;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1;
      letter-spacing: 0;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border-radius: 8px;
      background: var(--dark);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 760;
      white-space: nowrap;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      text-decoration: none;
    }

    .date {
      font-size: 22px;
      font-weight: 760;
      margin-bottom: 4px;
    }

    .label {
      color: var(--muted);
      font-size: 14px;
    }

    .arrow {
      color: var(--blue);
      font-weight: 760;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 20px;
      background: var(--card);
    }

    @media (max-width: 680px) {
      .page { width: min(100% - 24px, 960px); padding-top: 28px; }
      .topbar { display: block; }
      .home-link { margin-top: 16px; }
      .card { display: block; }
      .arrow { display: inline-block; margin-top: 12px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div>
        <p class="eyebrow">Daily Intelligence Archive</p>
        <h1>历史日报</h1>
      </div>
      <a class="home-link" href="../">返回今日首页</a>
    </section>
    <section class="list">
      
      <a class="card" href="2026-07-23/">
        <div>
          <div class="date">2026年7月23日</div>
          <div class="label">Digital Commerce Intelligence Brief</div>
        </div>
        <div class="arrow">查看日报 →</div>
      </a>
    

      <a class="card" href="2026-07-22/">
        <div>
          <div class="date">2026年7月22日</div>
          <div class="label">Digital Commerce Intelligence Brief</div>
        </div>
        <div class="arrow">查看日报 →</div>
      </a>
    
    </section>
  </main>
</body>
</html>
